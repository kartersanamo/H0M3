name: H0M3
version: '1.0.1'
main: com.sanamo.h0M3.H0M3
api-version: '1.21'
prefix: H0M3
author: KarterSanamo
description: Homes for all!
website: com.kartersanamo

commands:
  h0m3:
    description: Core plugin commands
    usage: /<command> <reload|admin [player]>
    aliases: [ ]
  sethome:
    description: Sets a new home for the player
    usage: /<command> <name>
    aliases: [ ]
  home:
    description: Teleports the player to their home
    usage: /<command> <name>
    aliases: [ ]
  deletehome:
    description: Deletes a player's home
    usage: /<command> <name>
    aliases: [ delhome ]
  homes:
    description: Shows all of the player's homes
    usage: /<command>
    aliases: [ ]
  renamehome:
    description: Renames a player's home
    usage: /<command> <name> <new_name>
    aliases: [ changename ]
  movehome:
    description: Moves a home to the player's location
    usage: /<command> <home>
    aliases: [ ]
  edithome:
    description: Edits a player's home information
    usage: /<command> <home>
    aliases: [ ]
  homeinfo:
    description: Sends information on a player's home
    usage: /<command> <home>
    aliases: [ ]
  adminhomes:
    description: Opens the admin GUI for managing all players' homes
    usage: /<command> [player]
    aliases: [ ahomes ]
